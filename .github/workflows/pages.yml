name: KommunalRadar Bayern aktualisieren

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: "30 5 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Tagesdaten erzeugen
        run: npm run update

      - name: App bauen
        run: npm run build

      - name: Pages vorbereiten
        uses: actions/configure-pages@v5

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
